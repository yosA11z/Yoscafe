<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contacto - Yoscafé</title>
    <link rel="stylesheet" href="contacto.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Yoscafé</h1>
            <p>Tu café favorito, ¡contáctanos!</p>
        </header>

        <section class="contact-info">
            <h2>Contactos</h2>
            <p><strong>Teléfono:</strong> <a href="tel:+3133420339">313 342 0339</a></p>
            <p><strong>Correo:</strong> <a href="mailto:fayogu21@gmail.com">fayogu21@gmail.com</a></p>
        </section>

        <section class="form-section">
            <h2>Formulario de Contacto</h2>
            <form id="contactForm" novalidate>
                <label for="name">Nombre completo</label>
                <input type="text" id="name" name="name" placeholder="Tu nombre" required />

                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required />

                <label for="message">Mensaje</label>
                <textarea id="message" name="message" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>

                <button type="submit">Enviar</button>
            </form>
            <p id="formMessage" class="form-message"></p>
        </section>
    </div>

    <script src="contacto.js"></script>
</body>
</html>
